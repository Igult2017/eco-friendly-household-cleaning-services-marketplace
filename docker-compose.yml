services:
  nginx:
    build:
      context: ./nginx          # uses nginx/Dockerfile
    container_name: dorix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx-ssl:/etc/nginx/ssl  # cert is auto-generated on first run, persists across rebuilds
    depends_on:
      app:
        condition: service_started
    networks:
      - dorix-net

  migrator:
    build:
      context: .
      target: migrator          # dedicated migration stage — runs once and exits
    env_file:
      - .env.local
    depends_on:
      pgbouncer:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dorix-net
    restart: "no"               # never restart — if migrations fail, fix and redeploy

  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY}
        NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-eu}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    image: dorix-app:latest
    restart: unless-stopped
    expose:
      - "3000"                             # internal only — Nginx is the public entry point
    env_file:
      - .env.local
    depends_on:
      migrator:
        condition: service_completed_successfully   # app only starts after migrations pass
      pgbouncer:
        condition: service_started
    networks:
      - dorix-net
    deploy:
      replicas: 6                          # one per CPU core (leave 2 for Nginx + PgBouncer)
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: dorix-umami
    restart: unless-stopped
    ports:
      - "3001:3000"                        # browser-accessible for tracking script + first-time admin login
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - dorix-net

  umami-db:
    image: postgres:15-alpine
    container_name: dorix-umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dorix-net

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: dorix-pgbouncer
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: host.docker.internal
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: dorix
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: dorix
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
    expose:
      - "6432"                             # internal only — app connects via service name
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dorix-net

networks:
  dorix-net:
    driver: bridge

volumes:
  nginx-ssl:      # persists the auto-generated origin cert across container rebuilds
  umami-db-data:  # Umami analytics database — kept across container rebuilds
