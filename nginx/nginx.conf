worker_processes auto;                  # one worker per CPU core
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;            # max simultaneous connections per worker
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $request_time s "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;             # hide Nginx version

    # ── Gzip ───────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Rate limiting zones ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream: Next.js app container ───────────────────────
    upstream nextjs {
        server app:3000;
        keepalive 32;                   # reuse connections to Next.js
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ──────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;                  # replace with your domain in production

        # SSL — Cloudflare manages the public cert; this is the origin cert.
        # Generate with: openssl req -x509 -nodes -days 3650 -newkey rsa:2048
        #                -keyout /etc/nginx/ssl/origin.key
        #                -out /etc/nginx/ssl/origin.crt
        ssl_certificate     /etc/nginx/ssl/origin.crt;
        ssl_certificate_key /etc/nginx/ssl/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────────
        add_header X-Frame-Options         DENY always;
        add_header X-Content-Type-Options  nosniff always;
        add_header Referrer-Policy         strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Static assets: serve directly with long cache ─────
        # Next.js standalone puts static files in .next/static
        # The runner stage copies them to /app/.next/static
        location /_next/static/ {
            proxy_pass http://nextjs;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /public/ {
            proxy_pass http://nextjs;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── Auth endpoints: strict rate limit ─────────────────
        location ~ ^/(sign-in|sign-up|api/auth) {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;
        }

        # ── API: standard rate limit ──────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;
        }

        # ── Everything else → Next.js ─────────────────────────
        location / {
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;
        }
    }
}
